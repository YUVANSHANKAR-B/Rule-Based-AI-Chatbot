<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
            height: 90vh;
            max-height: 700px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            font-weight: 600;
            font-size: 18px;
        }
        
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .message {
            display: flex;
            margin-bottom: 12px;
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 75%;
            word-wrap: break-word;
            line-height: 1.4;
        }
        
        .user-msg {
            justify-content: flex-end;
        }
        
        .user-bubble {
            background: #667eea;
            color: white;
            border-radius: 18px 18px 4px 18px;
        }
        
        .bot-msg {
            justify-content: flex-start;
        }
        
        .bot-bubble {
            background: #e5e7eb;
            color: #1f2937;
            border-radius: 18px 18px 18px 4px;
        }
        
        .input-section {
            border-top: 1px solid #e5e7eb;
            padding: 16px;
            display: flex;
            gap: 10px;
            background: #f9fafb;
        }
        
        .input-section input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .input-section input:focus {
            border-color: #667eea;
        }
        
        .input-section button {
            padding: 10px 20px;
            border: none;
            border-radius: 24px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .send-btn {
            background: #667eea;
            color: white;
        }
        
        .send-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .clear-btn {
            background: #ef4444;
            color: white;
            padding: 10px 16px;
        }
        
        .clear-btn:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }
        
        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #9ca3af;
            font-size: 14px;
            text-align: center;
            flex-direction: column;
            gap: 10px;
        }
        
        .empty-state-icon {
            font-size: 48px;
            opacity: 0.5;
        }

        .chat-box::-webkit-scrollbar {
            width: 6px;
        }

        .chat-box::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        .chat-box::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        .chat-box::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            💬 AI Chatbot
        </div>
        
        <div class="chat-box" id="chatBox">
            {% if conversation|length == 1 %}
                <div class="empty-state">
                    <div class="empty-state-icon">🤖</div>
                    <div>Start a conversation!</div>
                    <div style="font-size: 12px; opacity: 0.7;">Ask about internships, time, weather, or anything else</div>
                </div>
            {% else %}
                {% for message in conversation %}
                    <div class="message {% if message.role == 'user' %}user-msg{% else %}bot-msg{% endif %}">
                        <div class="bubble {% if message.role == 'user' %}user-bubble{% else %}bot-bubble{% endif %}">
                            {{ message.text }}
                        </div>
                    </div>
                {% endfor %}
            {% endif %}
        </div>
        
        <form method="post" class="input-section" id="chatForm">
            <input 
                type="text" 
                name="user_input" 
                placeholder="Type your message..." 
                value="{{ user_text }}" 
                autofocus
                required
            />
            <button type="submit" class="send-btn">Send</button>
            <button type="submit" formaction="{{ url_for('clear_chat') }}" formmethod="post" class="clear-btn">Clear</button>
        </form>
    </div>
    
    <script>
        // Auto-scroll to bottom when page loads
        const chatBox = document.getElementById('chatBox');
        chatBox.scrollTop = chatBox.scrollHeight;
        
        // Focus input after message sent
        document.getElementById('chatForm').addEventListener('submit', function() {
            setTimeout(() => {
                document.querySelector('input[name="user_input"]').focus();
            }, 100);
        });
    </script>
</body>
</html>
